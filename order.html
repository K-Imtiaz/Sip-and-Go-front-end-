<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | Sip & Go</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Sip & Go</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="order.html">Login / Order</a>
        </nav>
    </header>

    <div class="container" style="max-width: 500px;">
        <h2>Create Account & Order</h2>
        <p>Please enter your details to proceed with your order.</p>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="address">Delivery Address:</label>
                <input type="text" id="address" name="address" required>
            </div>

            <div class="form-group">
                <label for="age">Verify Age (18+ for alcohol):</label>
                <select id="age" name="age" required>
                    <option value="">Select an option</option>
                    <option value="over18">I am 18 or older</option>
                    <option value="under18">I am under 18</option>
                </select>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Proceed to Payment</button>
        </form>
    </div>
</body>
</html>
