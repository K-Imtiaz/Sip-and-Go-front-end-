<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu | Sip & Go</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <header>
        <div class="logo" style="font-size: 1.5rem; font-weight: bold;">Sip & Go</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="cart.html">🛒 Cart <span id="cart-count" style="background: #e74c3c; color: white; border-radius: 50%; padding: 2px 7px; font-size: 0.8rem; margin-left: 3px; display: none;">0</span></a>
            <button class="theme-btn" onclick="toggleTheme()">🌗 Theme</button>
        </nav>
    </header>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 20px;">Our Selection</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1605810730811-96576b509355?q=80&w=600&auto=format&fit=crop" alt="Beer">
                <h3>Local Craft Beer</h3>
                <p style="font-weight: bold; color: #27ae60;">£12.99</p>
                <button class="btn" style="width: 100%;" onclick="addToCart('Local Craft Beer', 12.99)">Add to Cart 🛒</button>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?q=80&w=600&auto=format&fit=crop" alt="Wine">
                <h3>Premium Red Wine</h3>
                <p style="font-weight: bold; color: #27ae60;">£24.50</p>
                <button class="btn" style="width: 100%;" onclick="addToCart('Premium Red Wine', 24.50)">Add to Cart 🛒</button>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=600&auto=format&fit=crop" alt="Cola">
                <h3>Sparkling Cola (2L)</h3>
                <p style="font-weight: bold; color: #27ae60;">£2.99</p>
                <button class="btn" style="width: 100%;" onclick="addToCart('Sparkling Cola', 2.99)">Add to Cart 🛒</button>
            </div>

        </div>
    </div>
</body>
</html>
